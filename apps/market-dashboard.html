<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Market Dashboard</title>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --surface-2: #1c1c22;
    --surface-3: #242429;
    --text: #f0f0f2;
    --text-muted: #8e8e93;
    --text-dim: #5a5a5e;
    --green: #30d158;
    --green-dim: rgba(48,209,88,0.12);
    --red: #ff453a;
    --red-dim: rgba(255,69,58,0.12);
    --accent: #c8a44e;
    --accent-dim: rgba(200,164,78,0.12);
    --blue: #4a9eff;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }
  .container { max-width:600px; margin:0 auto; padding:20px 16px 80px; }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0 8px;
  }
  .header h1 { font-size:28px; font-weight:700; letter-spacing:-0.3px; }
  .header .refresh-btn {
    background:var(--surface); border:1px solid var(--surface-2);
    color:var(--text-muted); border-radius:10px; padding:8px 14px;
    font-size:13px; cursor:pointer; font-family:inherit; font-weight:600;
  }
  .header .refresh-btn:active { background:var(--surface-2); }

  .market-status {
    font-size:13px; color:var(--text-dim); padding:4px 0 20px;
  }
  .market-status .dot {
    display:inline-block; width:8px; height:8px; border-radius:50%;
    margin-right:6px; vertical-align:middle;
  }
  .dot.open { background:var(--green); }
  .dot.closed { background:var(--red); }

  .section-title {
    font-size:13px; font-weight:600; color:var(--accent);
    text-transform:uppercase; letter-spacing:1.2px;
    margin-bottom:12px; padding-left:4px;
  }

  /* Index Cards */
  .indices { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:28px; }
  @media(min-width:500px) { .indices { grid-template-columns:repeat(3,1fr); } }

  .index-card {
    background:var(--surface); border-radius:var(--radius); padding:16px;
  }
  .index-name { font-size:13px; color:var(--text-muted); font-weight:600; margin-bottom:6px; }
  .index-price { font-size:24px; font-weight:300; letter-spacing:-1px; margin-bottom:4px; }
  .index-change { font-size:14px; font-weight:600; }
  .index-change.up { color:var(--green); }
  .index-change.down { color:var(--red); }

  /* Positions */
  .positions { margin-bottom:28px; }
  .positions-list { background:var(--surface); border-radius:var(--radius); overflow:hidden; }

  .position-row {
    padding:14px 20px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid var(--surface-2);
    position:relative;
  }
  .position-row:last-child { border-bottom:none; }

  .pos-left { display:flex; align-items:center; gap:12px; }
  .pos-symbol {
    font-size:16px; font-weight:700; min-width:52px;
  }
  .pos-name { font-size:13px; color:var(--text-muted); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .pos-right { text-align:right; display:flex; align-items:center; gap:12px; }
  .pos-price { font-size:16px; font-weight:600; }
  .pos-change {
    font-size:13px; font-weight:600; padding:4px 10px;
    border-radius:8px; min-width:70px; text-align:center;
  }
  .pos-change.up { background:var(--green-dim); color:var(--green); }
  .pos-change.down { background:var(--red-dim); color:var(--red); }
  .pos-change.flat { background:var(--surface-2); color:var(--text-muted); }

  .pos-remove {
    background:none; border:none; color:var(--text-dim); font-size:18px;
    cursor:pointer; padding:4px; line-height:1;
  }
  .pos-remove:hover { color:var(--red); }

  /* Add position */
  .add-row {
    padding:12px 20px; display:flex; gap:10px;
    border-top:1px solid var(--surface-2);
  }
  .add-row input {
    flex:1; background:var(--surface-2); border:1px solid var(--surface-3);
    border-radius:10px; padding:10px 14px; font-size:15px; color:var(--text);
    outline:none; font-family:inherit; text-transform:uppercase;
  }
  .add-row input::placeholder { color:var(--text-dim); text-transform:none; }
  .add-row input:focus { border-color:var(--accent); }
  .add-row button {
    background:var(--accent); color:#000; border:none; border-radius:10px;
    padding:10px 18px; font-size:14px; font-weight:700; cursor:pointer;
    font-family:inherit;
  }
  .add-row button:active { opacity:0.8; }
  .add-row button:disabled { opacity:0.4; }

  .slots-info {
    text-align:center; padding:8px; font-size:12px; color:var(--text-dim);
  }

  .status-msg {
    text-align:center; padding:10px; font-size:14px; color:var(--text-muted);
    display:none;
  }
  .status-msg.visible { display:block; }
  .status-msg.error { color:var(--red); }

  /* Loading */
  .loading {
    text-align:center; padding:40px; color:var(--text-dim); font-size:15px;
  }
  .loading .spinner {
    display:inline-block; width:24px; height:24px; border:3px solid var(--surface-2);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite; margin-bottom:12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .last-updated {
    text-align:center; padding:16px; font-size:12px; color:var(--text-dim);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📈 Markets</h1>
    <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
  </div>
  <div class="market-status" id="marketStatus"></div>

  <div id="loadingState" class="loading">
    <div class="spinner"></div><br>
    Loading market data...
  </div>

  <div id="content" style="display:none">
    <div class="section-title">Major Indices</div>
    <div class="indices" id="indices"></div>

    <div class="section-title">Positions <span id="posCount" style="color:var(--text-dim)"></span></div>
    <div class="positions">
      <div class="positions-list" id="positionsList"></div>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>
  </div>
</div>

<script>
const MAX_POSITIONS = 5;
const STORAGE_KEY = 'openpot_market_positions';
const INDEX_SYMBOLS = ['^DJI', '^GSPC', '^IXIC'];
const INDEX_NAMES = { '^DJI':'DOW', '^GSPC':'S&P 500', '^IXIC':'NASDAQ' };
const DEFAULT_POSITIONS = ['AAPL', 'NVDA', 'TSLA'];

let positions = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (positions === null) {
  positions = DEFAULT_POSITIONS.slice();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
}

let quoteCache = {};
let isLoading = false;

function formatPrice(n) {
  if (n === undefined || n === null) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function formatChange(change, pct) {
  if (change === undefined || pct === undefined) return { text:'—', cls:'flat' };
  const sign = change >= 0 ? '+' : '';
  const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
  return { text:`${sign}${pct.toFixed(2)}%`, cls };
}

function isMarketOpen() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone:'America/New_York' }));
  const day = et.getDay();
  const hours = et.getHours();
  const mins = et.getMinutes();
  const time = hours * 60 + mins;
  if (day === 0 || day === 6) return false;
  return time >= 570 && time < 960; // 9:30 AM - 4:00 PM ET
}

async function fetchQuotes(symbols) {
  const allSymbols = symbols.join(',');
  try {
    // Use Yahoo Finance v8 API via cors proxy or direct
    const url = `https://query1.finance.yahoo.com/v8/finance/spark?symbols=${allSymbols}&range=1d&interval=1d`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      return data;
    }
  } catch(e) {}

  // Fallback: try v7 quote endpoint
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${allSymbols}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.quoteResponse && data.quoteResponse.result) {
        const result = {};
        data.quoteResponse.result.forEach(q => {
          result[q.symbol] = {
            price: q.regularMarketPrice,
            change: q.regularMarketChange,
            changePct: q.regularMarketChangePercent,
            name: q.shortName || q.longName || q.symbol,
            prevClose: q.regularMarketPreviousClose
          };
        });
        return result;
      }
    }
  } catch(e) {}

  // Fallback: try individual fetches via chart endpoint
  const result = {};
  for (const sym of symbols) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=1d&interval=1d`;
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        const meta = data.chart.result[0].meta;
        result[sym] = {
          price: meta.regularMarketPrice,
          change: meta.regularMarketPrice - meta.chartPreviousClose,
          changePct: ((meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose) * 100,
          name: meta.shortName || meta.longName || sym,
          prevClose: meta.chartPreviousClose
        };
      }
    } catch(e) {
      result[sym] = null;
    }
  }
  return result;
}

async function refreshAll() {
  if (isLoading) return;
  isLoading = true;

  const allSymbols = [...INDEX_SYMBOLS, ...positions];
  try {
    const quotes = await fetchQuotes(allSymbols);

    // Normalize response format
    if (quotes && quotes.chart) {
      // v8 spark format
      // Handle differently
    } else if (quotes) {
      // v7 or individual format
      quoteCache = { ...quoteCache, ...quotes };
    }

    // If fetchQuotes returned per-symbol data directly
    for (const sym of allSymbols) {
      if (quotes && quotes[sym]) {
        quoteCache[sym] = quotes[sym];
      }
    }
  } catch(e) {
    showStatus('Failed to fetch market data', true);
  }

  isLoading = false;
  render();
}

function showStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg visible' + (isError ? ' error' : '');
  if (!isError) setTimeout(() => el.className = 'status-msg', 3000);
}

function addPosition() {
  const input = document.getElementById('symbolInput');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  if (positions.length >= MAX_POSITIONS) { showStatus(`Maximum ${MAX_POSITIONS} positions`, true); return; }
  if (positions.includes(sym)) { showStatus('Already tracking ' + sym, true); return; }

  positions.push(sym);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
  input.value = '';

  // Fetch quote for new symbol
  fetchQuotes([sym]).then(q => {
    if (q && q[sym]) quoteCache[sym] = q[sym];
    render();
  });
  render();
}

function removePosition(sym) {
  positions = positions.filter(s => s !== sym);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
  delete quoteCache[sym];
  render();
}

function render() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Market status
  const open = isMarketOpen();
  document.getElementById('marketStatus').innerHTML =
    `<span class="dot ${open ? 'open' : 'closed'}"></span>${open ? 'Market Open' : 'Market Closed'}`;

  // Indices
  const indicesEl = document.getElementById('indices');
  indicesEl.innerHTML = INDEX_SYMBOLS.map(sym => {
    const q = quoteCache[sym];
    const name = INDEX_NAMES[sym] || sym;
    if (!q) return `
      <div class="index-card">
        <div class="index-name">${name}</div>
        <div class="index-price" style="color:var(--text-dim)">—</div>
        <div class="index-change flat">Loading...</div>
      </div>`;
    const chg = formatChange(q.change, q.changePct);
    return `
      <div class="index-card">
        <div class="index-name">${name}</div>
        <div class="index-price">${formatPrice(q.price)}</div>
        <div class="index-change ${chg.cls}">${chg.text} (${q.change >= 0 ? '+' : ''}${formatPrice(q.change)})</div>
      </div>`;
  }).join('');

  // Positions
  document.getElementById('posCount').textContent = `(${positions.length}/${MAX_POSITIONS})`;

  const listEl = document.getElementById('positionsList');
  const rows = positions.map(sym => {
    const q = quoteCache[sym];
    if (!q) return `
      <div class="position-row">
        <div class="pos-left">
          <div class="pos-symbol">${sym}</div>
          <div class="pos-name">Loading...</div>
        </div>
        <div class="pos-right">
          <div class="pos-price" style="color:var(--text-dim)">—</div>
          <div class="pos-change flat">—</div>
          <button class="pos-remove" onclick="removePosition('${sym}')">✕</button>
        </div>
      </div>`;
    const chg = formatChange(q.change, q.changePct);
    return `
      <div class="position-row">
        <div class="pos-left">
          <div class="pos-symbol">${sym}</div>
          <div class="pos-name">${q.name || ''}</div>
        </div>
        <div class="pos-right">
          <div class="pos-price">${formatPrice(q.price)}</div>
          <div class="pos-change ${chg.cls}">${chg.text}</div>
          <button class="pos-remove" onclick="removePosition('${sym}')">✕</button>
        </div>
      </div>`;
  }).join('');

  const canAdd = positions.length < MAX_POSITIONS;
  const addRow = canAdd ? `
    <div class="add-row">
      <input type="text" id="symbolInput" placeholder="Add ticker (e.g. MSFT)" maxlength="6"
        onkeydown="if(event.key==='Enter')addPosition()">
      <button onclick="addPosition()">Add</button>
    </div>` : '';

  listEl.innerHTML = rows + addRow;

  // Last updated
  document.getElementById('lastUpdated').textContent =
    `Last updated: ${new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })}`;
}

// Init
refreshAll();

// Auto-refresh every 60s if market is open
setInterval(() => {
  if (isMarketOpen()) refreshAll();
}, 60000);
</script>
</body>
</html>
